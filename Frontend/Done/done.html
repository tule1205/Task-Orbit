<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Orbit - Done</title>
    <link rel="stylesheet" href="/Done/done.css">
    <script type="module" src="/Done/done.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo-text">My Task</h1>
            <ul class="nav-links task-list" id="taskList"></ul>
            <p class="sidebar-hint">Subtasks done</p>
            <ul class="subtask-nav" id="subtaskNav"></ul>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="brand">
                    <img src="/DashBoard/Image/Screenshot%202026-03-14%20155039.png" alt="Task Orbit Logo" class="brand-logo">
                    <strong>TASK ORBIT</strong>
                </div>
                <div class="user-info">Account</div>
            </header>

            <section class="details-card done-card">
                <div class="card-header done-card-header">
                    <div class="done-card-title-row">
                        <h2 class="main-task-title" id="subtaskTitle">—</h2>
                        <span class="finish-date" id="finishDate"></span>
                    </div>
                    <div class="card-actions done-card-actions">
                        <button type="button" class="card-btn-issues" id="activityBtn">Activity</button>
                        <div class="card-menu-wrap">
                            <button type="button" class="card-menu-btn" id="cardMenuBtn" aria-label="More options" aria-expanded="false">⋯</button>
                            <div class="card-menu-dropdown" id="cardMenuDropdown" hidden>
                                <button type="button" class="card-menu-item" id="editModeBtn">Edit</button>
                                <button type="button" class="card-menu-item" id="addFilesBtn">Add files</button>
                                <button type="button" class="card-menu-item" id="createIssueBtn">Create issue</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="content-body-scroll">
                    <div class="content-panel active" id="panelMain">
                        <div class="info-group">
                            <h3 class="label">Sources</h3>
                            <div class="sources-list" id="sourcesList">Select a subtask.</div>
                        </div>
                        <div class="chat-container hidden" id="chatContainer">
                            <h3 class="label">Chat</h3>
                            <div class="chat-entries" id="chatEntries"></div>
                            <div class="chat-input-wrap">
                                <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." maxlength="2000" aria-label="Chat message">
                                <button type="button" id="chatSendBtn" class="chat-send-btn">Send</button>
                            </div>
                        </div>
                    </div>
                    <div class="content-panel" id="panelActivity">
                        <button type="button" class="issues-back-btn" id="activityBackBtn">← Back</button>
                        <div class="info-group">
                            <h3 class="label">Activity</h3>
                            <div class="activity-page-list" id="activityPageList"></div>
                        </div>
                    </div>
                </div>

                <input type="file" id="fileInput" multiple accept="*/*" hidden>

                <div id="issueModal" class="issue-modal" hidden>
                    <div class="issue-modal-content">
                        <div class="issue-modal-header">
                            <h3>Create issue</h3>
                            <button type="button" class="issue-modal-close" id="issueModalClose" aria-label="Close">&times;</button>
                        </div>
                        <div class="issue-modal-body">
                            <label for="issueTitle">Title</label>
                            <input type="text" id="issueTitle" placeholder="Issue title" class="issue-input">
                            <label for="issueDescription">Description (optional)</label>
                            <textarea id="issueDescription" placeholder="Describe the issue..." class="issue-input" rows="3"></textarea>
                        </div>
                        <div class="issue-modal-footer">
                            <button type="button" class="issue-modal-cancel" id="issueModalCancel">Cancel</button>
                            <button type="button" class="issue-modal-submit" id="issueModalSubmit">Create issue</button>
                        </div>
                    </div>
                </div>
            </section>

            <footer class="status-navigation">
                <a href="/" class="nav-pill" id="toDoPill">To Do</a>
                <a href="/inprogress" class="nav-pill" id="inProgressPill">In Progress</a>
                <a href="/inreview" class="nav-pill" id="inReviewPill">In Review</a>
                <button class="nav-pill active" type="button">Done</button>
            </footer>
        </main>
    </div>
</body>
</html>
